# Name of your application.
service: angelmora_work

# Name of the container image on Docker Hub.
image: angelmomaa/angelmora_work

# Deploy to these servers.
servers:
  web:
    - 5.78.202.225

# Enable SSL auto certification via Let's Encrypt
proxy:
  ssl: true
  host: angelmora.dev
  app_port: 80

# Credentials for Docker Hub.
registry:
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Configure builder setup — remote, with cleaned up server resources.
builder:
  arch: amd64
  dockerfile: Dockerfile
  remote: ssh://root@5.78.202.225

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  clear:
    RAILS_SERVE_STATIC_FILES: true
    RAILS_LOG_TO_STDOUT: true
    RAILS_ENV: production
    DB_HOST: 5.78.202.225
    DB_PORT: 5433
    DB_USERNAME: angelmora_work
  secret:
    - RAILS_MASTER_KEY
    - DB_PASSWORD

# Use a persistent storage volume for ActiveStorage uploads.
volumes:
  - "rails_storage:/rails/storage"

# Bridge fingerprinted assets between versions.
asset_path: /rails/public/assets

# Accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:17
    host: 5.78.202.225
    port: "5433:5432"
    env:
      clear:
        POSTGRES_USER: angelmora_work
        POSTGRES_DB: angelmora_work_production
        POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
